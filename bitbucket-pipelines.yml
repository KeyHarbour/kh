image: golang:1.22

definitions:
  caches:
    go-mod: /go/pkg/mod
    go-build: /root/.cache/go-build

pipelines:
  default:
    - step:
        name: Build and Test
        caches:
          - go-mod
          - go-build
        script:
          - go version
          - make tidy
          - make vet
          - make fmt
          - make build
          - make test
          - make coverage-report
        artifacts:
          - bin/kh
          - coverage/**

  pull-requests:
    '**':
      - step:
          name: Build and Test (PR)
          caches:
            - go-mod
            - go-build
          script:
            - go version
            - make tidy
            - make vet
            - make fmt
            - make build
            - make test
            - make coverage-report
          artifacts:
            - bin/kh
            - coverage/**

  tags:
    'v*':
      - step:
          name: Release (goreleaser)
          caches:
            - go-mod
            - go-build
          script:
            - go version
            - make tidy
            - make vet
            - make fmt
            - make test
            - make coverage-report
            # install goreleaser (quiet)
            - curl -sSfL https://goreleaser.com/static/install.sh | sh
            # ensure useful tools exist (installs coreutils including sha256sum)
            - apt-get update && apt-get install -y zip tar gzip bzip2 coreutils
            # run goreleaser (it will read the tag to set the version)
            - goreleaser release --rm-dist
            # prepare release notes and checksums for upload
            - mkdir -p dist
            - git --no-pager log --no-merges --pretty=format:"%h %s" -n 200 > dist/release-notes-${BITBUCKET_TAG}.txt || true
            - if ls dist/* >/dev/null 2>&1; then sha256sum dist/* > dist/checksums-${BITBUCKET_TAG}.txt || true; else echo "No dist artifacts found"; fi
            # Upload generated artifacts to Bitbucket Downloads using an app password
            # Requires repository secure variables: BITBUCKET_USERNAME and BITBUCKET_APP_PASSWORD
            - REPO_OWNER=${BITBUCKET_REPO_OWNER:-${BITBUCKET_WORKSPACE}}
            - REPO_SLUG=${BITBUCKET_REPO_SLUG}
            - echo "Uploading artifacts to Bitbucket Downloads for ${REPO_OWNER}/${REPO_SLUG}"
            - |
              if ls dist/* >/dev/null 2>&1; then
                for f in dist/*; do
                  echo "Uploading ${f}"
                  curl -sSf -u "${BITBUCKET_USERNAME}:${BITBUCKET_APP_PASSWORD}" \
                    -X POST "https://api.bitbucket.org/2.0/repositories/${REPO_OWNER}/${REPO_SLUG}/downloads" \
                    -F files=@"${f}" || { echo "upload failed: ${f}"; exit 1; }
                done
              else
                echo "No artifacts to upload; skipping upload step."
              fi
          artifacts:
            - dist/**
            - coverage/**
    - step:
        name: Build and Test
        caches:
          - go-mod
          - go-build
        script:
          - go version
          - make tidy
          - make vet
          - make fmt
          - make build
          - make test
          - make coverage-report
        artifacts:
          - bin/kh
          - coverage/**

  pull-requests:
    '**':
      - step:
          name: Build and Test (PR)
          caches:
            - go-mod
            - go-build
          script:
            - go version
            - make tidy
            - make vet
            - make fmt
            - make build
            - make test
            - make coverage-report
          artifacts:
            - bin/kh
            - coverage/**

  tags:
    'v*':
      - step:
          name: Release (goreleaser)
          caches:
            - go-mod
            - go-build
          script:
            - go version
            - make tidy
            - make vet
            - make fmt
            - make test
            - make coverage-report
            # install goreleaser
            - curl -sSfL https://goreleaser.com/static/install.sh | sh
            # ensure useful tools exist
            - apt-get update && apt-get install -y zip tar gzip bzip2
            # export version from tag
            - export VERSION=${BITBUCKET_TAG}
            # run goreleaser to produce cross-OS artifacts into ./dist
            - goreleaser release --rm-dist
            # prepare release notes and checksums for upload
            - mkdir -p dist
            - echo "Generating simple release notes"
            - git --no-pager log --no-merges --pretty=format:"%h %s" -n 200 > dist/release-notes-${BITBUCKET_TAG}.txt || true
            - if [ -f dist/*checksums.txt ]; then echo "checksums present"; else shasum -a 256 dist/* > dist/checksums-${BITBUCKET_TAG}.txt || true; fi
            # Upload generated artifacts to Bitbucket Downloads using an app password
            # Requires repository variables: BITBUCKET_USERNAME and BITBUCKET_APP_PASSWORD
            - REPO_OWNER=${BITBUCKET_REPO_OWNER:-${BITBUCKET_WORKSPACE}}
            - REPO_SLUG=${BITBUCKET_REPO_SLUG}
            - echo "Uploading artifacts to Bitbucket Downloads for ${REPO_OWNER}/${REPO_SLUG}"
            - 'for f in dist/*; do echo "Uploading $f"; curl -sSf -u "${BITBUCKET_USERNAME}:${BITBUCKET_APP_PASSWORD}" -X POST "https://api.bitbucket.org/2.0/repositories/${REPO_OWNER}/${REPO_SLUG}/downloads" -F files=@${f} || { echo "upload failed: ${f}"; exit 1; }; done'
          artifacts:
            - coverage/**
