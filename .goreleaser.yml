version: 2

project_name: kh

builds:
  - id: kh
    main: ./cmd/kh
    binary: kh
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X kh/pkg/version.Version={{.Version}}
    hooks:
      post:
        # Sign and notarize darwin binaries. The script is a no-op for non-darwin
        # targets and when not running on a macOS host.
        - cmd: ./scripts/sign-and-notarize.sh {{ .Path }} {{ .Os }}
          output: true
          env:
            - APPLE_DEVELOPER_IDENTITY={{ .Env.APPLE_DEVELOPER_IDENTITY }}
            - NOTARIZE_ISSUER_ID={{ .Env.NOTARIZE_ISSUER_ID }}
            - NOTARIZE_KEY_ID={{ .Env.NOTARIZE_KEY_ID }}
            - NOTARIZE_KEY_PATH={{ .Env.NOTARIZE_KEY_PATH }}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
    wrap_in_directory: true

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

homebrew_casks:
  - name: kh
    homepage: "https://keyharbour.ca"
    description: "Official CLI for KeyHarbour — self-hosted Terraform state backend"
    license: "MIT"
    repository:
      owner: KeyHarbour
      name: homebrew-tap
      branch: main
      token: "{{ .Env.GH_PAT }}"
    binaries:
      - kh
    commit_author:
      name: github-actions[bot]
      email: github-actions[bot]@users.noreply.github.com

changelog:
  use: git

snapshot:
  version_template: "snapshot-{{ .Timestamp }}"
