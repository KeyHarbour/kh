version: 2

project_name: kh

builds:
  - id: kh
    main: ./cmd/kh
    binary: kh
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X kh/pkg/version.Version={{.Version}}

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
    wrap_in_directory: true

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

changelog:
  use: git

release:
  github:
    owner: ""
    name: ""
  # We'll use Bitbucket uploads; keep GitHub section blank unless you publish there

snapshot:
  name_template: "snapshot-{{ .Timestamp }}"
