name: Integration – Diagnostics

# Non-destructive health checks against the live KeyHarbour backend.
# Runs on a schedule and can also be triggered manually or called from
# other workflows.
#
# Safe to run at any time — diagnostics never mutate backend state
# (unless KH_DIAG_STATE_ID is set, which enables a lock/unlock round-trip
# against a nominated test state).

on:
  schedule:
    # Every hour at :00
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (e.g. staging, production)'
        required: true
        default: staging
      diag_state_id:
        description: >
          State UUID to use for the lock/unlock round-trip diagnostic.
          Leave empty to skip the lock test.
        required: false
  workflow_call:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        type: string
        default: staging
      diag_state_id:
        description: 'State UUID for lock/unlock round-trip (optional)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  diagnostics:
    name: Run diagnostics (${{ inputs.environment || 'staging' }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build kh binary
        run: make build

      - name: Run diagnostics
        env:
          KH_ENDPOINT: ${{ vars.KH_ENDPOINT }}
          KH_TOKEN: ${{ secrets.KH_TOKEN }}
          KH_ORG: ${{ vars.KH_ORG }}
          KH_TEST_MODE: diagnostics
          KH_DIAG_STATE_ID: ${{ inputs.diag_state_id || vars.KH_DIAG_STATE_ID }}
        run: |
          go test \
            -tags integration \
            ./integration-tests/... \
            -run TestDiagnostics \
            -v \
            -count=1 \
            -timeout 3m

