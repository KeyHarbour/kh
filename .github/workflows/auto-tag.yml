name: Auto Tag

# Fires on every push to main. If VERSION changed and that version is not
# already tagged, creates and pushes the tag — which in turn triggers release.yml.

on:
  push:
    branches:
      - main
    paths:
      - VERSION

permissions:
  contents: write

jobs:
  tag:
    name: Create version tag
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: echo "value=v$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check
        run: |
          if git rev-parse "${{ steps.version.outputs.value }}" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.value }}"
          git push origin "${{ steps.version.outputs.value }}"
          echo "Tagged ${{ steps.version.outputs.value }}"

      - name: Skip (tag already exists)
        if: steps.check.outputs.exists == 'true'
        run: echo "Tag ${{ steps.version.outputs.value }} already exists — skipping."
