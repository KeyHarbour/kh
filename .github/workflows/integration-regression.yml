name: Integration – Regression

# Compare the live KeyHarbour backend AFTER a deployment against a
# previously collected snapshot.
#
# Trigger manually with a snapshot_run_id, or chain it from a release
# pipeline that ran the snapshot job first:
#
#   jobs:
#     snapshot:
#       uses: ./.github/workflows/integration-snapshot.yml
#       secrets: inherit
#     regression:
#       needs: snapshot
#       uses: ./.github/workflows/integration-regression.yml
#       secrets: inherit
#       with:
#         snapshot_run_id: ${{ needs.snapshot.outputs.snapshot_run_id }}

on:
  workflow_dispatch:
    inputs:
      snapshot_run_id:
        description: >
          Run ID of the snapshot workflow to compare against.
          Leave empty to use the most recently uploaded snapshot artifact.
        required: false
      environment:
        description: 'Target environment (e.g. staging, production)'
        required: true
        default: staging
      regression_level:
        description: 'Regression strictness: strict | partial | warn'
        required: false
        default: strict
  workflow_call:
    inputs:
      snapshot_run_id:
        description: 'Run ID that owns the snapshot artifact (output of the snapshot job)'
        required: true
        type: string
      environment:
        description: 'Target environment'
        required: false
        type: string
        default: staging
      regression_level:
        description: 'Regression strictness: strict | partial | warn'
        required: false
        type: string
        default: strict

permissions:
  contents: read

jobs:
  regression:
    name: Run regression tests
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build kh binary
        run: make build

      # Download the snapshot produced by the corresponding snapshot run.
      # When snapshot_run_id is provided (pipeline usage), target that exact
      # artifact; otherwise fall back to the latest available artifact with
      # the expected name prefix (manual usage).
      - name: Download snapshot artifact (specific run)
        if: inputs.snapshot_run_id != ''
        uses: actions/download-artifact@v4
        with:
          name: kh-snapshot-${{ inputs.snapshot_run_id }}
          path: integration-tests/testdata/snapshots/

      - name: Download snapshot artifact (latest)
        if: inputs.snapshot_run_id == ''
        uses: actions/download-artifact@v4
        with:
          # Matches the most recent artifact whose name starts with kh-snapshot-
          pattern: kh-snapshot-*
          merge-multiple: false
          path: integration-tests/testdata/snapshots/

      - name: List snapshot contents
        run: find integration-tests/testdata/snapshots -type f | sort

      - name: Run regression tests
        env:
          KH_ENDPOINT: ${{ vars.KH_ENDPOINT }}
          KH_TOKEN: ${{ secrets.KH_TOKEN }}
          KH_PROJECT: ${{ vars.KH_PROJECT }}
          KH_ORG: ${{ vars.KH_ORG }}
          KH_TEST_MODE: regression
          KH_SNAPSHOT_DIR: ./integration-tests/testdata/snapshots/latest
          KH_REGRESSION_LEVEL: ${{ inputs.regression_level || 'strict' }}
        run: |
          go test \
            -tags integration \
            ./integration-tests/... \
            -run TestRegression \
            -v \
            -count=1 \
            -timeout 10m

      - name: Upload regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-report-${{ github.run_id }}
          retention-days: 30
          path: integration-tests/testdata/snapshots/
