name: Go CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  # ── Build, test, coverage ──────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Verify modules
        run: |
          make tidy
          if ! git diff --quiet go.mod go.sum; then
            echo "go.mod/go.sum are out of date — run 'go mod tidy' locally"
            git diff go.mod go.sum
            exit 1
          fi

      - name: Format check
        run: |
          make fmt
          if ! git diff --quiet; then
            echo "Go files are not formatted — run 'go fmt ./...' locally"
            git diff
            exit 1
          fi

      - name: Vet
        run: make vet

      - name: Build
        run: make build

      - name: Test with coverage
        run: |
          mkdir -p coverage
          go test -covermode=atomic -coverprofile=coverage/coverage.out ./...
          go tool cover -html=coverage/coverage.out -o coverage/coverage.html
          go tool cover -func=coverage/coverage.out | tee coverage/coverage.txt

      - name: Coverage summary
        run: |
          TOTAL=$(grep '^total:' coverage/coverage.txt | awk '{print $NF}')
          {
            echo "## Test Coverage: ${TOTAL}"
            echo ""
            echo "<details><summary>Per-function breakdown</summary>"
            echo ""
            echo '```'
            cat coverage/coverage.txt
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        with:
          name: coverage
          path: coverage/**

      - name: Upload binary
        uses: actions/upload-artifact@v6
        with:
          name: kh-binary
          path: bin/kh

  # ── Lint ──────────────────────────────────────────────────────────────────
  # Runs golangci-lint using .golangci.yml. Results appear as job annotations
  # on PRs and as a summary in the Actions UI.
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: --timeout=5m

  # ── Security ──────────────────────────────────────────────────────────────
  # govulncheck: fails the job if known CVEs are found in the dependency graph.
  # gosec:       advisory static analysis — findings appear in the job summary.
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.2.0
          govulncheck ./...

      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          set +e
          gosec -fmt=text -out=/tmp/gosec.txt ./... 2>&1
          GOSEC_EXIT=$?
          set -e
          {
            echo "## Security Scan (gosec)"
            if [ "$GOSEC_EXIT" -eq 0 ]; then
              echo ":white_check_mark: No issues found"
            else
              echo ":warning: Advisory findings — review before shipping"
              echo ""
              echo '```'
              cat /tmp/gosec.txt
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
