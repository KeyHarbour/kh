name: Go CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Skip the automated version-bump commit on branches, but always run on tags
    # so the release job can trigger after bump_version pushes a v* tag.
    if: "!(startsWith(github.ref, 'refs/heads/') && contains(github.event.head_commit.message, '[skip ci]'))"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build & Test
        run: |
          go version
          make tidy
          make vet
          make fmt
          make build
          make test
          make coverage-report

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/**

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: kh-binary
          path: bin/kh

  bump_version:
    name: Bump Version & Tag
    needs: build
    # Only on direct pushes to main; skip tag pushes and automated bump commits.
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and update changelog
        id: bump
        run: |
          chmod +x scripts/bump-version.sh
          scripts/bump-version.sh
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          git add VERSION CHANGELOG.md
          # Check if anything was actually staged; set output flag accordingly.
          if git diff --cached --quiet; then
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          else
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit, tag, and push
        if: steps.bump.outputs.bumped == 'true'
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: bump version to $VERSION [skip ci]"
          git push origin main
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    # macOS runner required for codesign and notarytool (Xcode CLI tools).
    # Cross-compilation for Linux and Windows still works with CGO_ENABLED=0.
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          # Create a short-lived keychain so the cert is never written to the
          # default login keychain and is automatically cleaned up after the job.
          KEYCHAIN_NAME="build-keychain"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          # Mask the generated password so it never appears in logs.
          echo "::add-mask::$KEYCHAIN_PASSWORD"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"

          echo "$MACOS_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          security import /tmp/certificate.p12 \
            -k "$KEYCHAIN_NAME" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          # Defer actual deletion to the cleanup step (always runs).
          # Remove here too so the file isn't left around longer than needed.
          rm -f /tmp/certificate.p12

          # Add the build keychain to the search list so codesign can find the cert.
          security list-keychain -d user -s "$KEYCHAIN_NAME" login.keychain

          # Allow codesign to access the key without a UI password prompt.
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"

          # Export the password so the cleanup step can delete the keychain.
          echo "KEYCHAIN_NAME=$KEYCHAIN_NAME" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

      - name: Prepare notarization API key
        env:
          NOTARIZE_KEY: ${{ secrets.NOTARIZE_KEY }}
        run: |
          # Write to a path only the runner user can read.
          install -m 600 /dev/null /tmp/notarize-key.p8
          echo "$NOTARIZE_KEY" | base64 --decode > /tmp/notarize-key.p8
          echo "NOTARIZE_KEY_PATH=/tmp/notarize-key.p8" >> "$GITHUB_ENV"

      - name: Make sign-and-notarize script executable
        run: chmod +x scripts/sign-and-notarize.sh

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_DEVELOPER_IDENTITY: ${{ secrets.APPLE_DEVELOPER_IDENTITY }}
          NOTARIZE_ISSUER_ID: ${{ secrets.NOTARIZE_ISSUER_ID }}
          NOTARIZE_KEY_ID: ${{ secrets.NOTARIZE_KEY_ID }}
          NOTARIZE_KEY_PATH: ${{ env.NOTARIZE_KEY_PATH }}

      - name: Cleanup secrets
        if: always()
        run: |
          rm -f /tmp/notarize-key.p8
          rm -f /tmp/certificate.p12
          security delete-keychain "$KEYCHAIN_NAME" 2>/dev/null || true
