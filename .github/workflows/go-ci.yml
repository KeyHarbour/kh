name: Go CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5.4.0
        with:
          go-version: '1.22'
          cache: true

      - name: Build & Test
        run: |
          go version
          make tidy
          if ! git diff --quiet go.mod go.sum; then
            echo "go.mod/go.sum are out of date — run 'go mod tidy' locally"
            git diff go.mod go.sum
            exit 1
          fi
          make vet
          make fmt
          if ! git diff --quiet; then
            echo "Go files are not formatted — run 'go fmt ./...' locally"
            git diff
            exit 1
          fi
          make build
          make test
          make coverage-report

      - name: Upload coverage
        uses: actions/upload-artifact@v4.6.2
        with:
          name: coverage
          path: coverage/**

      - name: Upload binary
        uses: actions/upload-artifact@v4.6.2
        with:
          name: kh-binary
          path: bin/kh
